apiVersion: apps/v1
kind: Deployment
metadata:
  name: avinash031997
  labels: 
    app: avinash031997
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avinash031997
  template:
    metadata:
      labels:
        app: avinash031997
    spec:
      containers:
      - name: avinash031997
        image: avinash031997/application
        imagePullPolicy: Always
        ports:
        - name: avinash-port
          containerPort: 8080
      initContainers:
      - name: init-mydb
        image: busybox
        args: ['-c', 'until nslookup vprodb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for mydb; sleep 2; done;']
      - name: init-memcache
        image: busybox
        args: ['-c', 'until nslookup vprocache01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local;do echo waiting for mydb; sleep 2; done;']
